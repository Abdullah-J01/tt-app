name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Dummy values so the build can run without secrets in CI.
          NEXTAUTH_SECRET: "ci-placeholder-secret"
          NEXTAUTH_URL: "http://localhost:3000"
          # No TT_API_BASE_URL in CI → the app builds against mock data.
